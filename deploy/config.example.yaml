notifiers:
  - type: telegram
    bot_token: "REPLACE_ME"
    chat_id: "REPLACE_ME"
    lang: ru                 # ru | en — language of all Telegram messages
    # SOCKS5 proxy for Telegram (use if api.telegram.org is unreachable directly).
    # Format: socks5h://user:pass@host:port  or  socks5h://host:port (no auth)
    # proxy: "socks5h://user:pass@proxy.example.com:1080"

# Reactive alerts: each check runs on its interval, sends to TG only on
# transitions: ok->warn(🟡), ok/warn->crit(🔴), any->ok(🟢 resolved).
# Stays quiet while the level doesn't change.
checks:
  - type: cpu
    name: cpu
    interval: 60
    warn_pct: 80              # 🟡 above this
    crit_pct: 90              # 🔴 above this
  - type: memory
    name: memory
    interval: 60
    warn_pct: 80
    crit_pct: 90
  - type: disk
    name: disk-root
    interval: 60
    path: /
    warn_pct: 80
    crit_pct: 90
  # systemd units — alerts if is-active != active
  # - type: systemd
  #   name: systemd-nginx
  #   interval: 60
  #   unit: nginx.service

# Periodic full status digest
report:
  interval: 2700               # 45 minutes
  hostname: my-server
  notifier: telegram

  host:
    disks: ["/"]
    interfaces: [eth0]     # omit to sum across all interfaces
    warn_pct: 80           # thresholds for icons and recommendations

  recent_errors:
    limit: 5               # how many recent unique errors to show
    # By default reads logs.storage.path; disable with: recent_errors: false

  # List of compose files and containers to monitor.
  # `containers` — which service names to show (empty = all).
  # `starred` — which to highlight with ⭐️.
  docker:
    - compose: /opt/goda/docker-compose.yaml
      containers: [goda-platform, goda-engine, goda-db, goda-redis]
      starred: [goda-platform, goda-engine]
    - compose: /opt/tanos/docker-compose.yaml
      containers: [tanos-web, tanos-db]

# Log streaming: each unique error fires once immediately, repeats are
# collected and sent as a digest every digest_interval. The file is written
# to storage.path and rotated when it exceeds max_size_mb.
logs:
  notifier: telegram
  digest_interval: 3600        # seconds, every hour
  storage:
    path: logs/blackbox.jsonl  # path relative to WorkingDirectory
    max_size_mb: 10            # rotate when current file exceeds this
    keep_archives: 7           # how many .jsonl.gz archives to keep
  sources:
    - type: file
      name: nginx-error
      path: /var/log/nginx/error.log
      pattern: ".+"
    - type: docker
      name: goda-app
      compose: /opt/goda/docker-compose.yaml
      service: goda-platform
      pattern: "ERROR|CRITICAL|Traceback"
      poll_interval: 60          # seconds, how often to pull new lines (default 60)
    - type: journal
      name: nginx-systemd
      unit: nginx.service
      pattern: "(?i)error|warn"

  # postgres / dlq — commented out, uncomment if needed
